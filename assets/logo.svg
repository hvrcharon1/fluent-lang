<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 124" width="580" height="124">
  <defs>
    <linearGradient id="fg" gradientUnits="userSpaceOnUse" x1="195" y1="106" x2="315" y2="466">
      <stop offset="0%"   stop-color="#00C4FF"/>
      <stop offset="42%"  stop-color="#2244EE"/>
      <stop offset="100%" stop-color="#8822BB"/>
    </linearGradient>
    <linearGradient id="ng" gradientUnits="userSpaceOnUse" x1="130" y1="155" x2="260" y2="340">
      <stop offset="0%"   stop-color="#55CCFF"/>
      <stop offset="100%" stop-color="#5533BB"/>
    </linearGradient>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00C4FF"/>
      <stop offset="50%"  stop-color="#4455EE"/>
      <stop offset="100%" stop-color="#8822BB"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#2244EE" flood-opacity="0.3" result="c"/>
      <feComposite in="c" in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

