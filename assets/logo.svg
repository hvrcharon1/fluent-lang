      C 138 338 118 322 104 300 C 90 278 82 250 84 222
      C 86 194 96 168 114 148 C 132 128 158 114 186 109
      C 212 104 246 106 274 112 C 290 115 298 116 304 116 Z
      M 268 246 C 268 196 236 156 196 156 C 156 156 124 196 124 246
      C 124 296 156 336 196 336 C 236 336 268 296 268 246 Z
      M 166 332 L 143 396 L 212 354 Z
    "/>
    <g stroke="url(#ng)" stroke-width="3.2" stroke-linecap="round" fill="none" opacity="0.9">
