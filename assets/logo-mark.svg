<svg xmlns="http://www.w3.org/2000/svg" viewBox="72 90 424 388" width="200" height="200">
  <defs>
    <!-- Main F gradient: cyan → blue → purple (matches uploaded design) -->
    <linearGradient id="fg" gradientUnits="userSpaceOnUse" x1="195" y1="106" x2="315" y2="466">
      <stop offset="0%"   stop-color="#00C4FF"/>
      <stop offset="42%"  stop-color="#2244EE"/>
      <stop offset="100%" stop-color="#8822BB"/>
    </linearGradient>
    <!-- Neural network gradient -->
    <linearGradient id="ng" gradientUnits="userSpaceOnUse" x1="130" y1="155" x2="260" y2="340">
      <stop offset="0%"   stop-color="#55CCFF"/>
      <stop offset="100%" stop-color="#5533BB"/>
    </linearGradient>
    <!-- Glow filter for depth -->
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#2244EE" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Node glow -->
    <filter id="nGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="b"/>
      <feFlood flood-color="#44CCFF" flood-opacity="0.6" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    F body: single compound path, fill-rule=evenodd.
    Sub-path 1: Outer F boundary (clockwise).
    Sub-path 2: Speech bubble interior ellipse (creates transparent cutout).
    Sub-path 3: Speech bubble tail triangle (extends the cutout downward).
  -->
  <path fill-rule="evenodd" fill="url(#fg)" filter="url(#glow)" d="
    M 304 116
    C 355 106 418 103 456 113
    C 475 122 481 148 477 172
    C 473 196 456 209 430 213
    C 400 217 356 217 318 218
    C 308 218 304 215 304 210
    L 304 252
    C 314 248 364 244 410 248
    C 442 252 462 268 463 292
    C 464 316 450 332 428 338
    C 400 344 361 344 328 342
    C 309 340 304 333 304 325
    L 304 380
    C 292 388 272 398 252 412
    C 235 424 217 440 205 455
    L 200 462
    L 226 450
    C 248 438 261 422 267 404
    C 273 388 276 375 278 368
    C 266 360 248 354 228 352
    C 206 350 182 350 160 344
    C 138 338 118 322 104 300
    C 90  278 82  250 84  222
    C 86  194 96  168 114 148
    C 132 128 158 114 186 109
    C 212 104 246 106 274 112
    C 290 115 298 116 304 116
    Z
    M 268 246
    C 268 196 236 156 196 156
    C 156 156 124 196 124 246
    C 124 296 156 336 196 336
    C 236 336 268 296 268 246
    Z
    M 166 332
    L 143 396
    L 212 354
    Z
  "/>

  <!-- Neural network edges (inside the speech bubble) -->
  <g stroke="url(#ng)" stroke-width="3.2" stroke-linecap="round" fill="none" opacity="0.88">
    <line x1="196" y1="177" x2="236" y2="194"/>
    <line x1="236" y1="194" x2="247" y2="240"/>
    <line x1="247" y1="240" x2="218" y2="278"/>
    <line x1="218" y1="278" x2="163" y2="266"/>
    <line x1="163" y1="266" x2="163" y2="218"/>
    <line x1="163" y1="218" x2="196" y2="177"/>
    <line x1="196" y1="177" x2="247" y2="240"/>
    <line x1="236" y1="194" x2="218" y2="278"/>
  </g>

  <!-- Neural network nodes -->
  <circle cx="196" cy="177" r="12" fill="url(#ng)" filter="url(#nGlow)"/>
  <circle cx="236" cy="194" r="9"  fill="url(#ng)" filter="url(#nGlow)"/>
  <circle cx="247" cy="240" r="13" fill="url(#ng)" filter="url(#nGlow)"/>
  <circle cx="218" cy="278" r="9"  fill="url(#ng)" filter="url(#nGlow)"/>
  <circle cx="163" cy="266" r="10" fill="url(#ng)" filter="url(#nGlow)"/>
  <circle cx="163" cy="218" r="8"  fill="url(#ng)" filter="url(#nGlow)"/>
</svg>
