<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#07080f"/>
      <stop offset="100%" stop-color="#0d0e1a"/>
    </linearGradient>
    <linearGradient id="fg" gradientUnits="userSpaceOnUse" x1="195" y1="106" x2="315" y2="466">
      <stop offset="0%"   stop-color="#00C4FF"/>
      <stop offset="42%"  stop-color="#2244EE"/>
      <stop offset="100%" stop-color="#8822BB"/>
    </linearGradient>
    <linearGradient id="ng" gradientUnits="userSpaceOnUse" x1="130" y1="155" x2="260" y2="340">
      <stop offset="0%"   stop-color="#55CCFF"/>
      <stop offset="100%" stop-color="#5533BB"/>
    </linearGradient>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00C4FF"/>
      <stop offset="50%"  stop-color="#4466EE"/>
      <stop offset="100%" stop-color="#8822BB"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#aabbdd" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="fGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#2244EE" flood-opacity="0.45" result="c"/>
      <feComposite in="c" in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/>
      <feFlood flood-color="#44CCFF" flood-opacity="0.7" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#2244EE" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Background glow blobs -->
  <ellipse cx="220" cy="320" rx="260" ry="260" fill="#2244EE" opacity="0.06"/>
  <ellipse cx="1060" cy="320" rx="200" ry="200" fill="#8822BB" opacity="0.07"/>

  <!-- F icon — large, centred on left half -->
  <!-- Scale: want ~380px tall. Original height=376. Scale=380/376=1.01. Use 0.82 for padding. -->
  <!-- translate(52, 95) scale(0.82 * 1280/500 crop logic) -->
  <!-- viewBox 72 90 424 388 → width=424 height=388 → scale to 280×271 at left area -->
  <g transform="translate(52, 100) scale(0.56)">
    <path fill-rule="evenodd" fill="url(#fg)" filter="url(#fGlow)" d="
      M 304 116 C 355 106 418 103 456 113 C 475 122 481 148 477 172
      C 473 196 456 209 430 213 C 400 217 356 217 318 218
      C 308 218 304 215 304 210 L 304 252
      C 314 248 364 244 410 248 C 442 252 462 268 463 292
      C 464 316 450 332 428 338 C 400 344 361 344 328 342
      C 309 340 304 333 304 325 L 304 380
      C 292 388 272 398 252 412 C 235 424 217 440 205 455 L 200 462
      L 226 450 C 248 438 261 422 267 404 C 273 388 276 375 278 368
      C 266 360 248 354 228 352 C 206 350 182 350 160 344
      C 138 338 118 322 104 300 C 90 278 82 250 84 222
      C 86 194 96 168 114 148 C 132 128 158 114 186 109
      C 212 104 246 106 274 112 C 290 115 298 116 304 116 Z
      M 268 246 C 268 196 236 156 196 156 C 156 156 124 196 124 246
      C 124 296 156 336 196 336 C 236 336 268 296 268 246 Z
      M 166 332 L 143 396 L 212 354 Z
    "/>
    <g stroke="url(#ng)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.92">
      <line x1="196" y1="177" x2="236" y2="194"/>
      <line x1="236" y1="194" x2="247" y2="240"/>
      <line x1="247" y1="240" x2="218" y2="278"/>
      <line x1="218" y1="278" x2="163" y2="266"/>
      <line x1="163" y1="266" x2="163" y2="218"/>
      <line x1="163" y1="218" x2="196" y2="177"/>
      <line x1="196" y1="177" x2="247" y2="240"/>
      <line x1="236" y1="194" x2="218" y2="278"/>
    </g>
    <circle cx="196" cy="177" r="14" fill="url(#ng)" filter="url(#nGlow)"/>
    <circle cx="236" cy="194" r="11" fill="url(#ng)" filter="url(#nGlow)"/>
    <circle cx="247" cy="240" r="16" fill="url(#ng)" filter="url(#nGlow)"/>
    <circle cx="218" cy="278" r="11" fill="url(#ng)" filter="url(#nGlow)"/>
    <circle cx="163" cy="266" r="12" fill="url(#ng)" filter="url(#nGlow)"/>
    <circle cx="163" cy="218" r="10" fill="url(#ng)" filter="url(#nGlow)"/>
  </g>

  <!-- Wordmark: FLUENT -->
  <text x="350" y="295"
        font-family="'Segoe UI','Inter','SF Pro Display',system-ui,sans-serif"
        font-size="148" font-weight="800" letter-spacing="-5"
        fill="url(#wg)" filter="url(#textGlow)">FLUENT</text>

  <!-- Tagline -->
  <text x="352" y="352"
        font-family="'Segoe UI','Inter',system-ui,sans-serif"
        font-size="26" font-weight="400" letter-spacing="7"
        fill="url(#tg)" opacity="0.75">NATURAL LANGUAGE AI PROGRAMMING</text>

  <!-- Code snippet decoration -->
  <rect x="350" y="388" width="860" height="134" rx="10" ry="10"
        fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="375" y="418" font-family="'JetBrains Mono','Fira Code','Consolas',monospace"
        font-size="20" fill="#00C4FF" opacity="0.9">Ask claude to</text>
  <text x="530" y="418" font-family="'JetBrains Mono','Fira Code','Consolas',monospace"
        font-size="20" fill="#ffffff" opacity="0.7"> "classify this patient record"</text>
  <text x="375" y="448" font-family="'JetBrains Mono','Fira Code','Consolas',monospace"
        font-size="20" fill="#00C4FF" opacity="0.9">  using data</text>
  <text x="494" y="448" font-family="'JetBrains Mono','Fira Code','Consolas',monospace"
        font-size="20" fill="#8822BB" opacity="0.9"> patient</text>
  <text x="565" y="448" font-family="'JetBrains Mono','Fira Code','Consolas',monospace"
        font-size="20" fill="#ffffff" opacity="0.7"> and call the result</text>
  <text x="820" y="448" font-family="'JetBrains Mono','Fira Code','Consolas',monospace"
        font-size="20" fill="#8822BB" opacity="0.9"> risk.</text>
  <text x="375" y="478" font-family="'JetBrains Mono','Fira Code','Consolas',monospace"
        font-size="20" fill="#2244EE" opacity="0.9">Filter</text>
  <text x="428" y="478" font-family="'JetBrains Mono','Fira Code','Consolas',monospace"
        font-size="20" fill="#8822BB" opacity="0.9"> records</text>
  <text x="530" y="478" font-family="'JetBrains Mono','Fira Code','Consolas',monospace"
        font-size="20" fill="#00C4FF" opacity="0.9"> where</text>
  <text x="608" y="478" font-family="'JetBrains Mono','Fira Code','Consolas',monospace"
        font-size="20" fill="#8822BB" opacity="0.9"> risk.score</text>
  <text x="733" y="478" font-family="'JetBrains Mono','Fira Code','Consolas',monospace"
        font-size="20" fill="#ffffff" opacity="0.6"> is greater than 0.8</text>
  <text x="375" y="508" font-family="'JetBrains Mono','Fira Code','Consolas',monospace"
        font-size="20" fill="#ffffff" opacity="0.45">  and call the result high_risk_patients.</text>

  <!-- Version badge -->
  <rect x="350" y="542" width="96" height="30" rx="6" fill="#2244EE" fill-opacity="0.25"
        stroke="#2244EE" stroke-opacity="0.5" stroke-width="1"/>
  <text x="398" y="562" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600"
        fill="#6699FF">v1.2.0</text>
  <rect x="458" y="542" width="140" height="30" rx="6" fill="#ffffff" fill-opacity="0.05"
        stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="528" y="562" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="500"
        fill="#aabbcc" opacity="0.8">101 tests ✓</text>
  <rect x="610" y="542" width="152" height="30" rx="6" fill="#ffffff" fill-opacity="0.05"
        stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="686" y="562" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="500"
        fill="#aabbcc" opacity="0.8">MIT · Datacules</text>

  <!-- Bottom border accent -->
  <rect x="0" y="632" width="1280" height="8" rx="0" fill="url(#wg)" opacity="0.6"/>
</svg>
