name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Test suite ─────────────────────────────────────────────────────────────
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [ '18.x', '20.x', '22.x' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: node bin/fluent.js test ./tests/ --reporter pretty

      - name: Verify CLI commands exist
        run: |
          node bin/fluent.js --version
          node bin/fluent.js run --help
          node bin/fluent.js test --help
          node bin/fluent.js serve --help
          node bin/fluent.js estimate --help

      - name: Dry-run all examples
        run: |
          node bin/fluent.js run --dry-run examples/hello.fl
          node bin/fluent.js run --dry-run examples/sentiment.fl
          node bin/fluent.js run --dry-run examples/pipeline.fl
          node bin/fluent.js run --dry-run examples/api.fl
          node bin/fluent.js run --dry-run examples/vision.fl
          node bin/fluent.js run --dry-run examples/document-qa.fl
          node bin/fluent.js run --dry-run examples/audio-transcribe.fl
          node bin/fluent.js run --dry-run examples/multimodal-api.fl

      - name: Build all examples
        run: |
          node bin/fluent.js build examples/hello.fl --out dist/
          node bin/fluent.js build examples/pipeline.fl --out dist/
          ls dist/

      - name: Estimate cost (no API keys needed)
        run: |
          node bin/fluent.js estimate examples/sentiment.fl
          node bin/fluent.js estimate examples/pipeline.fl --json

  # ── Hello World smoke test ─────────────────────────────────────────────────
  smoke:
    name: Smoke test (hello.fl)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - run: npm ci

      - name: Run hello.fl (mock mode — no API key)
        run: node bin/fluent.js run examples/hello.fl

      - name: JSON cost estimate
        run: node bin/fluent.js estimate examples/pipeline.fl --json

  # ── Security audit ────────────────────────────────────────────────────────
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
